<!DOCTYPE html>
<html lang="en">

    <head>

        <title>Mullvad Start Page</title>

        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        
        <!-- Stylesheets -->
        <link rel="stylesheet" href="styles/index.css">

        <!-- Scripts -->
        <script src="scripts/index.js" defer></script>

    </head>

    <body>
        
        <!-- Browser Search Bar Overlay -->
        <div class="browser-search-bar">
        
            <form id="searchForm" class="search-form" action="https://duckduckgo.com/" method="get" target="_blank">
        
                <input type="text" id="searchInput" name="q" class="search-input" placeholder="Search the web..." required autocomplete="off" autofocus>
                
                <!-- Custom HTML / CSS dropdown allowing image integration -->
                <div class="custom-dropdown">
        
                    <div class="dropdown-trigger" id="dropdownTrigger">
                        <img src="https://icons.duckduckgo.com/ip3/duckduckgo.com.ico" class="engine-favicon" id="currentFavicon">
                        <span id="currentText">DuckDuckGo</span>
                    </div>
                    
                    <div class="dropdown-menu" id="dropdownMenu">
        
                        <div class="dropdown-item"
                            data-value="ddg"
                            data-url="https://duckduckgo.com/"
                            data-param="q"
                            data-icon="https://icons.duckduckgo.com/ip3/duckduckgo.com.ico">
                            <img src="https://icons.duckduckgo.com/ip3/duckduckgo.com.ico" class="engine-favicon">
                            DuckDuckGo
                        </div>
        
                        <div class="dropdown-item"
                            data-value="brave"
                            data-url="https://search.brave.com/search"
                            data-param="q"
                            data-icon="https://icons.duckduckgo.com/ip3/brave.com.ico">
                            <img src="https://icons.duckduckgo.com/ip3/brave.com.ico" class="engine-favicon">
                            Brave
                        </div>
                        
                        <div class="dropdown-item"
                            data-value="mojeek"
                            data-url="https://www.mojeek.com/search"
                            data-param="q"
                            data-icon="https://icons.duckduckgo.com/ip3/mojeek.com.ico">
                            <img src="https://icons.duckduckgo.com/ip3/mojeek.com.ico" class="engine-favicon">
                            Mojeek
                        </div>

                        <div class="dropdown-item"
                            data-value="startpage"
                            data-url="https://www.startpage.com/sp/search"
                            data-param="query"
                            data-icon="https://icons.duckduckgo.com/ip3/startpage.com.ico">
                            <img src="https://icons.duckduckgo.com/ip3/startpage.com.ico" class="engine-favicon">
                            Startpage
                        </div>

                        <div class="dropdown-item"
                            data-value="searxng"
                            data-url="https://searx.be/search"
                            data-param="q"
                            data-icon="https://icons.duckduckgo.com/ip3/searx.be.ico">
                            <img src="https://icons.duckduckgo.com/ip3/searx.be.ico" class="engine-favicon">
                            SearXNG
                        </div>

                        <div class="dropdown-item"
                            data-value="qwant"
                            data-url="https://qwant.com/search"
                            data-param="q"
                            data-icon="https://icons.duckduckgo.com/ip3/qwant.com.ico">
                            <img src="https://icons.duckduckgo.com/ip3/qwant.com.ico" class="engine-favicon">
                            Qwant
                        </div>

                        <div class="dropdown-item"
                            data-value="metager"
                            data-url="https://metager.org/meta/meta.ger3"
                            data-param="eingabe"
                            data-icon="https://icons.duckduckgo.com/ip3/metager.org.ico">
                            <img src="https://icons.duckduckgo.com/ip3/metager.org.ico" class="engine-favicon">
                            MetaGer
                        </div>

                        <div class="dropdown-item"
                            data-value="metager"
                            data-url="https://swisscows.com/en/web"
                            data-param="query"
                            data-icon="https://icons.duckduckgo.com/ip3/swisscows.com.ico">
                            <img src="https://icons.duckduckgo.com/ip3/swisscows.com.ico" class="engine-favicon">
                            Swisscows
                        </div>

                        <div class="dropdown-item"
                            data-value="kagi"
                            data-url="https://kagi.com/search"
                            data-param="q"
                            data-icon="https://icons.duckduckgo.com/ip3/kagi.com.ico">
                            <img src="https://icons.duckduckgo.com/ip3/kagi.com.ico" class="engine-favicon">
                            Kagi
                        </div>
        
                    </div>
        
                </div>
        
            </form>
        
        </div>
    
    </body>

</html>
